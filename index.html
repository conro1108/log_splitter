<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#9fc3dd" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="log splitter" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <title>log_splitter</title>
  <style>
    :root {
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-r: env(safe-area-inset-right, 0px);
    }
    html, body {
      margin: 0; height: 100%; overflow: hidden; background: #0e1218;
      overscroll-behavior: none; touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }
    .hud {
      font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #e8e2d4;
      user-select: none; -webkit-user-select: none;
    }
    #hint {
      position: fixed; bottom: calc(22px + var(--safe-b)); left: 50%;
      transform: translateX(-50%); width: max-content; max-width: 88vw;
      font-size: 13px; letter-spacing: 0.04em; opacity: 0.55; text-align: center;
      transition: opacity 1.2s ease; pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    #caption {
      position: fixed; top: calc(26px + var(--safe-t)); left: 50%;
      transform: translateX(-50%); width: max-content; max-width: 88vw;
      font-size: 14px; letter-spacing: 0.08em; opacity: 0; text-align: center;
      transition: opacity 0.8s ease; pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    #gear {
      position: fixed; top: calc(12px + var(--safe-t)); right: calc(12px + var(--safe-r));
      width: 44px; height: 44px; border: none; border-radius: 10px;
      background: rgba(20, 24, 30, 0.45); color: #e8e2d4; font-size: 19px;
      cursor: pointer; opacity: 0.6; transition: opacity 0.2s ease;
      display: grid; place-items: center; touch-action: manipulation;
    }
    #gear:hover { opacity: 1; }
    #panel {
      position: fixed; top: calc(64px + var(--safe-t)); right: calc(12px + var(--safe-r));
      width: 250px; max-width: calc(100vw - 24px); padding: 14px 16px;
      border-radius: 12px; background: rgba(16, 20, 26, 0.9); font-size: 13px;
      line-height: 1.7; display: none; backdrop-filter: blur(6px);
      touch-action: manipulation;
    }
    #panel.open { display: block; }
    #panel h3 {
      margin: 0 0 8px; font-size: 12px; letter-spacing: 0.12em;
      text-transform: uppercase; opacity: 0.6;
    }
    #panel .stat { opacity: 0.85; margin-bottom: 10px; }
    #panel .stat b { color: #f0c987; font-weight: 600; }
    #panel label {
      display: block; cursor: pointer; opacity: 0.9;
      padding: 5px 0; /* a comfortable touch target */
    }
    #panel input { accent-color: #f0c987; margin-right: 8px; }
    #panel hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0; }
    #panel button.reset {
      margin-top: 10px; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px; background: transparent; color: #e8e2d4; cursor: pointer;
      font-family: inherit; font-size: 12px; opacity: 0.7;
    }
    #panel button.reset:hover { opacity: 1; border-color: #c26a5a; color: #c26a5a; }

    /* Phones: bigger touch copy, and keep the HUD clear of a portrait scene */
    @media (max-width: 560px) {
      #hint { font-size: 12px; bottom: calc(16px + var(--safe-b)); }
      #caption { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="caption" class="hud"></div>
  <div id="hint" class="hud"></div>
  <button id="gear" class="hud" title="settings" aria-label="settings">⚙</button>
  <div id="panel" class="hud">
    <h3>Woodpile</h3>
    <div class="stat"><b id="stat-cords">0.00</b> cords stacked · <b id="stat-logs">0</b> rounds split</div>
    <hr />
    <label><input type="checkbox" id="opt-sound" checked /> Sound</label>
    <button class="reset" id="btn-reset">Reset woodpile</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
